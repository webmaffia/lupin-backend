trigger:
  branches:
    include:
      - dev-backend
      - uat
      - main

pr: none

variables:
  azureServiceConnection: 'lupinglobal-sc'
  resourceGroupName: 'RG-Lupin-CI'
  nodeVersion: '20.x'
  artifactName: 'drop'

  uatWebAppName: 'cms-lupin-uat'
  prodWebAppName: 'cms-lupin-prd'

stages:

# =========================
# BUILD
# =========================
- stage: Build
  displayName: Build Backend (CMS)
  jobs:
    - job: BuildJob
      pool:
        vmImage: ubuntu-latest
      steps:
        - checkout: self
          clean: true

        - task: NodeTool@0
          inputs:
            versionSpec: '$(nodeVersion)'
          displayName: Use Node.js $(nodeVersion)

        - task: AdvancedSecurity-Codeql-Init@1
          displayName: Initialize CodeQL
          inputs:
            languages: 'javascript'
            querysuite: 'security-and-quality'
            configfilepath: '$(Build.SourcesDirectory)/.github/codeql/codeql-config.yml'

        - task: AdvancedSecurity-Dependency-Scanning@1
          displayName: Dependency Scanning

        - script: |
            set -e
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
          displayName: Install & Build
          env:
            CI: "true"

        - task: AdvancedSecurity-Codeql-Analyze@1
          displayName: Run CodeQL Analysis

        - task: ArchiveFiles@2
          displayName: Create deployment zip
          inputs:
            rootFolderOrFile: '$(Build.SourcesDirectory)'
            includeRootFolder: false
            archiveType: zip
            archiveFile: '$(Build.ArtifactStagingDirectory)/backend.zip'
            replaceExistingArchive: true
            excludePatterns: |
              **/.git/**
              **/.github/**
              **/.env
              **/.env.*
              **/*.log
              **/coverage/**

        - task: PublishBuildArtifacts@1
          displayName: Publish artifact
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)/backend.zip'
            ArtifactName: '$(artifactName)'

# =========================
# DEPLOY UAT
# =========================
- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/uat'))
  variables:
    - group: var-group-uat
  jobs:
    - deployment: DeployUAT
      displayName: Deploy CMS to UAT
      environment: uat
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: $(artifactName)

              - task: AzureCLI@2
                displayName: Deploy Code (ZipDeploy)
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    set -e
                    az webapp deployment source config-zip \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --src "$(Pipeline.Workspace)/$(artifactName)/backend.zip"

              - task: AzureCLI@2
                displayName: Configure Startup + App Settings
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    set -e

                    az webapp config set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --startup-file "node node_modules/@strapi/strapi/bin/strapi.js start"

                    az webapp config appsettings set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --settings \
                      WEBSITES_PORT="$(WEBSITES_PORT)" \
                      NODE_ENV="$(NODE_ENV)" \
                      HOST="$(HOST)" \
                      PORT="$(PORT)" \
                      DATABASE_CLIENT="$(DATABASE_CLIENT)" \
                      DATABASE_HOST="$(DATABASE_HOST)" \
                      DATABASE_PORT="$(DATABASE_PORT)" \
                      DATABASE_NAME="$(DATABASE_NAME)" \
                      DATABASE_USERNAME="$(DATABASE_USERNAME)" \
                      DATABASE_PASSWORD="$(DATABASE_PASSWORD)" \
                      DATABASE_SSL="$(DATABASE_SSL)" \
                      APP_KEYS="$(APP_KEYS)" \
                      API_TOKEN_SALT="$(API_TOKEN_SALT)" \
                      ADMIN_JWT_SECRET="$(ADMIN_JWT_SECRET)" \
                      TRANSFER_TOKEN_SALT="$(TRANSFER_TOKEN_SALT)" \
                      JWT_SECRET="$(JWT_SECRET)"

# =========================
# DEPLOY PROD
# =========================
- stage: Deploy_Prod
  displayName: Deploy to Production
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
    - group: var-group-prod
  jobs:
    - deployment: DeployProd
      displayName: Deploy CMS to Production
      environment: prod
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: $(artifactName)

              - task: AzureCLI@2
                displayName: Deploy Code (ZipDeploy)
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    set -e
                    az webapp deployment source config-zip \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(prodWebAppName)" \
                      --src "$(Pipeline.Workspace)/$(artifactName)/backend.zip"

              - task: AzureCLI@2
                displayName: Configure Startup + App Settings
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: 'bash'
                  scriptLocation: 'inlineScript'
                  inlineScript: |
                    set -e

                    az webapp config set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(prodWebAppName)" \
                      --startup-file "node node_modules/@strapi/strapi/bin/strapi.js start"

                    az webapp config appsettings set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(prodWebAppName)" \
                      --settings \
                      WEBSITES_PORT="$(WEBSITES_PORT)" \
                      NODE_ENV="$(NODE_ENV)" \
                      HOST="$(HOST)" \
                      PORT="$(PORT)" \
                      DATABASE_CLIENT="$(DATABASE_CLIENT)" \
                      DATABASE_HOST="$(DATABASE_HOST)" \
                      DATABASE_PORT="$(DATABASE_PORT)" \
                      DATABASE_NAME="$(DATABASE_NAME)" \
                      DATABASE_USERNAME="$(DATABASE_USERNAME)" \
                      DATABASE_PASSWORD="$(DATABASE_PASSWORD)" \
                      DATABASE_SSL="$(DATABASE_SSL)" \
                      APP_KEYS="$(APP_KEYS)" \
                      API_TOKEN_SALT="$(API_TOKEN_SALT)" \
                      ADMIN_JWT_SECRET="$(ADMIN_JWT_SECRET)" \
                      TRANSFER_TOKEN_SALT="$(TRANSFER_TOKEN_SALT)" \
                      JWT_SECRET="$(JWT_SECRET)"
