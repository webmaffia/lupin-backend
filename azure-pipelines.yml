trigger:
  branches:
    include:
      - uat

pr: none

variables:
  azureServiceConnection: 'RG-Lupin-CI-SC'
  resourceGroupName: 'RG-Lupin-CI'
  uatWebAppName: 'cms-lupin-uat'
  nodeVersion: '20.x'
  artifactName: 'drop'
  zipName: 'backend.zip'

stages:

# =========================================================
# BUILD STAGE
# =========================================================
- stage: Build
  displayName: Build + Security Scan (Strapi)
  jobs:
    - job: BuildJob
      displayName: Build Job
      pool:
        vmImage: ubuntu-latest

      steps:
        - checkout: self
          clean: true

        - task: NodeTool@0
          displayName: Use Node.js $(nodeVersion)
          inputs:
            versionSpec: '$(nodeVersion)'

        # CodeQL Init
        - task: AdvancedSecurity-Codeql-Init@1
          displayName: Initialize CodeQL
          inputs:
            languages: 'javascript'
            querysuite: 'security-and-quality'
            configfilepath: '$(Build.SourcesDirectory)/.github/codeql/codeql-config.yml'

        - task: AdvancedSecurity-Dependency-Scanning@1
          displayName: Dependency Scanning

        # Install + Build
        - script: |
            npm ci
            npm run build
          displayName: Install dependencies & build Strapi

        # CodeQL Analyze
        - task: AdvancedSecurity-Codeql-Analyze@1
          displayName: Run CodeQL Analysis

        # Create ZIP for deployment
        - task: ArchiveFiles@2
          displayName: Create deployment ZIP
          inputs:
            rootFolderOrFile: '$(Build.SourcesDirectory)'
            includeRootFolder: false
            archiveType: zip
            archiveFile: '$(Build.ArtifactStagingDirectory)/$(zipName)'
            replaceExistingArchive: true
            excludePatterns: |
              **/.git/**
              **/.github/**
              **/.cache/**
              **/node_modules/**
              **/.env
              **/.env.*
              **/*.log

        - task: PublishBuildArtifacts@1
          displayName: Publish Artifact
          inputs:
            PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(zipName)'
            ArtifactName: '$(artifactName)'

# =========================================================
# DEPLOY TO UAT
# =========================================================
- stage: Deploy_UAT
  displayName: Deploy to UAT (Strapi)
  dependsOn: Build
  condition: succeeded()

  variables:
    - group: var-group-uat

  jobs:
    - deployment: DeployUAT
      displayName: Deploy CMS to UAT Web App
      environment: uat
      strategy:
        runOnce:
          deploy:
            steps:
              - download: current
                artifact: $(artifactName)

              - task: AzureCLI@2
                displayName: Deploy Code to UAT (ZipDeploy)
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    az webapp deployment source config-zip \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --src "$(Pipeline.Workspace)/$(artifactName)/$(zipName)"

              - task: AzureCLI@2
                displayName: Configure UAT App Settings + Startup
                inputs:
                  azureSubscription: '$(azureServiceConnection)'
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    az webapp config set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --startup-file "node node_modules/@strapi/strapi/bin/strapi.js start"

                    az webapp config appsettings set \
                      --resource-group "$(resourceGroupName)" \
                      --name "$(uatWebAppName)" \
                      --settings \
                      NODE_ENV="$(NODE_ENV)" \
                      HOST="$(HOST)" \
                      PORT="$(PORT)" \
                      WEBSITES_PORT="$(WEBSITES_PORT)" \
                      DATABASE_CLIENT="$(DATABASE_CLIENT)" \
                      DATABASE_HOST="$(DATABASE_HOST)" \
                      DATABASE_PORT="$(DATABASE_PORT)" \
                      DATABASE_NAME="$(DATABASE_NAME)" \
                      DATABASE_USERNAME="$(DATABASE_USERNAME)" \
                      DATABASE_PASSWORD="$(DATABASE_PASSWORD)" \
                      DATABASE_SSL="$(DATABASE_SSL)" \
                      APP_KEYS="$(APP_KEYS)" \
                      API_TOKEN_SALT="$(API_TOKEN_SALT)" \
                      ADMIN_JWT_SECRET="$(ADMIN_JWT_SECRET)" \
                      JWT_SECRET="$(JWT_SECRET)" \
                      TRANSFER_TOKEN_SALT="$(TRANSFER_TOKEN_SALT)" \
                      ENCRYPTION_KEY="$(ENCRYPTION_KEY)"
